    <!-- Tailwind for hover/scroll effects -->

    <style>
        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .music-scroll-wrapper {
            display: flex;
            overflow: hidden;
            width: 100%;
            position: relative;
        }

        .track-list {
            display: flex;
            gap: 20px;
            animation: scroll-left 40s linear infinite;
            will-change: transform;
        }

        .track-list:hover {
            animation-play-state: paused;
        }

        .track-container {
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .track-container:hover {
            transform: scale(1.05);
        }

        .track-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>
